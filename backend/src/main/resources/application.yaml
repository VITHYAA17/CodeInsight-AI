spring:
  application:
    name: backend

  datasource:
    url: jdbc:postgresql://localhost:5432/codeinsight
    username: postgres
    password: CodeInsight@123

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

logging:
  level:
    org.springframework.security: DEBUG

spring:
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:your-openai-api-key-here}
      model: gpt-4-turbo
      base-url: https://api.openai.com/v1

jwt:
  secret: MySuperSecretKeyForCodeInsightAIApplication2026MySuperSecretKey
  expiration: 86400000